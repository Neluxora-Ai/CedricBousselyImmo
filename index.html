<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cédric Boussely Immobilier</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <img src="logo_cedric_immo.jpeg" alt="Logo" style="height:60px">
  <nav>
    <a href="#">Acheter</a>
    <a href="#">Louer</a>
    <a href="#">Vendre</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Votre futur bien commence ici</h1>
  <p>Maisons, villas et appartements sélectionnés.</p>
</section>
  
<section class="search-section">

    <div class="search-box">

        <div class="search-top">

            <input
                type="text"
                id="search"
                placeholder="🔍 Rechercher une ville, un quartier ou un bien...">

        </div>

        <div class="search-bottom">

    <select id="filtre-type">
        <option value="tous">Tous les biens</option>
        <option value="vente">À vendre</option>
        <option value="location">À louer</option>
    </select>

    <input type="number"
           id="filtre-prix"
           placeholder="Budget max (€)">

    <input type="number"
           id="filtre-surface"
           placeholder="Surface min (m²)">

    <input type="number"
           id="filtre-pieces"
           placeholder="Pièces min">

    <button id="btnRecherche">
        🔍 Rechercher
    </button>

</div>

    </div>

</section>

<section class="section">

    <h2>Nos biens</h2>

    <div id="maisons-grid"></div>

</section>

<div id="propertyModal" class="modal"></div>

<script src="biens.js"></script>
<script src="script.js"></script>
</body>
</html>
